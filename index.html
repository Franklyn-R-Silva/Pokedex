<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pokédex web que consome a PokéAPI. Pesquise por nome ou número, veja tipos, stats, habilidades e evolução, e baixe a imagem do Pokémon."
    />
    <meta name="author" content="Franklyn" />

    <link rel="icon" href="/favicons/favicon-16x16.png" />

    <link rel="preconnect" href="https://pokeapi.co" />
    <link rel="preconnect" href="https://raw.githubusercontent.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <script type="module" src="/src/main.js"></script>

    <title>Pokédex</title>
  </head>

  <body>
    <header class="topbar">
      <button class="theme-toggle" type="button" aria-label="Tema escuro">🌙</button>
    </header>

    <main>
      <div class="pokedex-device">
        <img src="" alt="pokemon" class="pokemon__image" />
        <h1 class="pokemon__data">
          <span class="pokemon__number"></span> -
          <span class="pokemon__name"></span>
        </h1>
        <form class="form" role="search">
          <input
            type="search"
            class="input__search"
            placeholder="Name or Number"
            autocomplete="off"
            role="combobox"
            aria-autocomplete="list"
            aria-expanded="false"
            required
          />
          <ul class="suggestions" role="listbox"></ul>
        </form>
        <div class="buttons">
          <button class="button btn-prev" type="button">Prev &lt;</button>
          <button class="button btn-next" type="button">Next &gt;</button>
        </div>
        <img src="/images/pokedex.png" alt="pokedex" class="pokedex" />
      </div>

      <section class="details">
        <div class="details__types"></div>

        <div class="details__meta">
          <div>
            <span class="label">Altura</span>
            <span class="height"></span>
          </div>
          <div>
            <span class="label">Peso</span>
            <span class="weight"></span>
          </div>
        </div>

        <h2 class="section-title">Stats</h2>
        <ul class="details__stats"></ul>

        <h2 class="section-title">Habilidades</h2>
        <div class="details__abilities"></div>

        <h2 class="section-title">Evolução</h2>
        <div class="details__evolution"></div>

        <div class="details__actions">
          <button class="btn-favorite" type="button" disabled>☆ Favoritar</button>
          <button class="btn-download btn-download--png" type="button" disabled>⬇ PNG</button>
          <button class="btn-download btn-download--gif" type="button" disabled>⬇ GIF</button>
        </div>
      </section>

      <section class="favorites">
        <h2 class="favorites__title">⭐ Favoritos</h2>
        <div class="favorites__list"></div>
      </section>
    </main>

    <footer class="site-footer">
      Feito por
      <a href="https://github.com/hadesfranklyn" target="_blank" rel="noopener">Franklyn</a>
      · Dados da <a href="https://pokeapi.co/" target="_blank" rel="noopener">PokéAPI</a>
    </footer>
  </body>
</html>
